context: |
  ## 项目概述
  AMS-AI 是一个多租户 AI 告警管理系统，采用单体 + 集群架构。

  ## 技术栈

  ### 后端
  - JDK 21, Quarkus 3.31.2
  - Hibernate ORM + Panache (JPA)
  - Hazelcast (集群缓存)
  - Gradle (Kotlin DSL)

  ### 前端
  - React 19, TypeScript 5, Vite 7
  - FSD (Feature-Sliced Design) 架构
  - shadcn/ui 组件库
  - urql (GraphQL), TanStack Query (REST)
  - Zustand (状态管理)

  ### API
  - GraphQL (查询), REST (命令)
  - 多租户: tenant_id + Hibernate Filter + TenantContext

  ## 模块结构
  - lib-common/: 常量、DTO、安全/租户上下文、异常处理
  - lib-persistence/: BaseEntity、Liquibase changelog
  - lib-cluster/: 集群缓存、事件广播
  - feature-*/: 业务特性 (admin/core/graphql/alert-ingestion/notification/ai-analysis)
  - app-boot/: Quarkus 启动模块
  - app-web/: React 前端工程

  ## 代码规范

  ### Java 后端
  - 包名: pro.walkin.ams.{module}.{layer}
  - 实体必须继承 BaseEntity，字段 public（不用 Lombok）
  - Repository 内嵌定义: public interface Repo extends PanacheRepository<Entity>
  - **分层职责**：Query 类负责查询，Service 类负责更新/事务方法
  - **Query vs Repository**: 简单查询直接用 Repository；复杂查询（多表关联、聚合、复杂过滤）放在 Query 类
  - **Service 禁止直接调用 Repository 查询方法**：Service 只能通过 Query 获取数据，确保查询逻辑集中管理
  - 写操作放在 *Service 且必须 @Transactional
  - 业务异常抛 BaseException
  - 使用 ./gradlew spotlessApply 自动格式化

  ### TypeScript 前端 (FSD 架构)
  - src/app/: 应用层 (providers, router, layout)
  - src/pages/: 页面层（仅组合，不含业务逻辑）
  - src/features/: 特性层（含 schema/, hooks/, components/）
  - src/store/: Zustand stores（按 feature 命名）
  - src/components/: shadcn/ui 共享组件
  - Hooks 命名: use{Feature}{Action}
  - 查询用 GraphQL (urql)，更新用 REST (axios)
  - 禁止创建 src/entities/ 目录
  - 禁止在 pages 中编写可复用业务组件
  - shadcn/ui 组件通过 CLI 安装: npx shadcn add <component>

  ## 架构硬规则
  - 单体架构，禁止拆微服务
  - 多租户: 核心表必须有 tenant_id 字段
  - 禁止跨租户访问
  - 避免本地内存缓存，使用 Hazelcast
  - 缓存失效使用 cache-invalidate Topic

