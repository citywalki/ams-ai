quarkus:
  datasource:
    db-kind: postgresql
  hibernate-orm:
    database:
      generation: drop-and-create
    log:
      sql: true
  liquibase:
    enabled: false
  rest-client:
    auth-api:
      url: http://localhost:8081
    user-api:
      url: http://localhost:8081
    role-api:
      url: http://localhost:8081
